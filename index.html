<!DOCTYPE html>
<html>
<head>
  <title>My Code Snippets</title>
  <style>
    body { font-family: monospace; max-width: 900px; margin: 0 auto; padding: 20px; }
    .snippet { background: #f5f5f5; border-left: 4px solid #0066cc; 
               padding: 15px; margin: 15px 0; }
    h1 { color: #333; }
    pre { overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Code Snippets</h1>
  
  <div class="snippet">
    <h3>Bash - Get Git branch</h3>
    <pre><code>git rev-parse --abbrev-ref HEAD</code></pre>
  </div>
  
  <div class="snippet">
    <h3>Python - Quick HTTP Server</h3>
    <pre><code>python3 -m http.server 8000</code></pre>
  </div>
</body>
</html>
